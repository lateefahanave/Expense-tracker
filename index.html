<!DOCTYPE html>
<html>
<head>
    <title>Simple Expense Tracker</title>
</head>
<body>

    <h1>Expense Tracker</h1>

    <input type="number" id="expenseAmount" placeholder="Amount">

    <h2>Expenses:</h2>
    <ul id="expenseList"></ul>

    <h3>Total: ₦<span id="totalAmount">0</span></h3>

    <script src="script.js"></script>
</body>
</html>
